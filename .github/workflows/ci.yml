name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # The build does not touch a real database; a throwaway SQLite file is enough.
      DATABASE_URL: "file:./db/ci.db"
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate
        run: bunx prisma generate

      - name: Prisma db push (create schema)
        run: bunx prisma db push --skip-generate

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
